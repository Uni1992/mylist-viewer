<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101114" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="U-NEXT List" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>配信マイリスト Safariビューア</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="logo" href="#" aria-label="トップ">
          <span class="logo-mark">ML</span>
          <b>MY LIST<br />BROWSER</b>
        </a>
        <button id="moreButton" class="icon-btn" type="button" aria-label="メニュー">•••</button>
        <div id="moreMenu" class="menu" hidden>
          <button id="syncButton" type="button">同期の設定</button>
          <label for="importJson">JSONを読み込む</label>
          <input id="importJson" type="file" accept="application/json,.json" hidden />
          <button id="exportJson" type="button">JSONを書き出す</button>
          <button id="loadSample" type="button">サンプルを表示</button>
          <button id="clearFilters" type="button">絞り込みをリセット</button>
          <hr />
          <button id="clearAll" class="danger" type="button">この端末のデータを削除</button>
        </div>
      </header>

      <p id="syncStatus" class="sync-status" role="status" hidden></p>

      <label class="search-field">
        <span class="search-icon">🔍</span>
        <input id="query" type="search" placeholder="作品名・ジャンル・メモで探す" autocomplete="off" />
      </label>
      <p class="stat-line" aria-label="集計">
        <strong id="totalCount">0</strong> 作品<span class="dot">·</span>
        <strong id="unwatchedCount">0</strong> 未視聴<span class="dot">·</span>
        平均 <strong id="averageRuntime">—</strong>
      </p>

      <button id="filterToggle" class="filter-toggle" type="button" aria-expanded="false" aria-controls="filtersPanel">
        <span>絞り込み</span>
        <small id="filterSummary">未視聴</small>
      </button>

      <section id="filtersPanel" class="filters" aria-label="絞り込み">
        <div class="facet-row" data-facet="mediaType">
          <span class="facet-label">大ジャンル</span>
          <div class="facet-chips" id="mediaFacets"></div>
        </div>
        <div class="facet-row" data-facet="service">
          <span class="facet-label">サービス</span>
          <div class="facet-chips" id="serviceFacets"></div>
        </div>
        <div class="facet-row" data-facet="watchState">
          <span class="facet-label">視聴状態</span>
          <div class="facet-chips" id="watchFacets"></div>
        </div>
        <div class="facet-row facet-genre" data-facet="genre">
          <span class="facet-label">ジャンル</span>
          <div class="facet-chips" id="genreFacets"></div>
        </div>
        <div class="runtime-field">
          <span class="ctl-label">上映時間 <b id="runtimeLabel">指定なし</b></span>
          <div class="range-slider" id="runtimeSlider">
            <div class="range-track"></div>
            <div class="range-fill" id="runtimeFill"></div>
            <input id="minMinutes" type="range" min="0" max="300" step="10" value="0" aria-label="上映時間の下限（分）" />
            <input id="maxMinutes" type="range" min="0" max="300" step="10" value="300" aria-label="上映時間の上限（分）" />
          </div>
        </div>
        <label class="sort-field">
          <span class="ctl-label">並び順</span>
          <select id="sort">
            <option value="added">追加順</option>
            <option value="expiry">配信終了が近い順</option>
            <option value="ratingDesc">評価が高い順</option>
            <option value="backlog">積み順（古い順）</option>
            <option value="title">タイトル順</option>
            <option value="runtimeAsc">短い順</option>
            <option value="runtimeDesc">長い順</option>
            <option value="yearDesc">新しい順</option>
          </select>
        </label>

        <div class="hidden-controls" hidden aria-hidden="true">
          <select id="mediaType">
            <option value="">すべて</option>
            <option value="movie">映画</option>
            <option value="drama">ドラマシリーズ</option>
            <option value="anime">アニメ</option>
            <option value="unknown">未分類</option>
          </select>
          <select id="service"><option value="">すべて</option></select>
          <select id="genre"><option value="">すべて</option></select>
          <select id="watchState">
            <option value="unwatched">未視聴</option>
            <option value="">すべて</option>
            <option value="watched">視聴済み</option>
            <option value="favorite">お気に入り</option>
          </select>
          <select id="duration"><option value="">すべて</option></select>
        </div>
      </section>

      <section class="results-head">
        <h2 id="resultsTitle">未視聴の作品</h2>
        <span id="filteredCount">0件</span>
      </section>

      <section id="library" class="library" aria-live="polite"></section>

      <section id="empty" class="empty" hidden>
        <div class="empty-mark">🎬</div>
        <h2>まだ作品がありません</h2>
        <p>右上の「•••」から同期を設定するか、JSONを読み込むと作品が表示されます。</p>
      </section>
    </main>

    <button id="pickButton" class="tonight-btn" type="button">
      <span class="tonight-ico">🎬</span> 今夜の一本を選ぶ
    </button>

    <dialog id="detailDialog">
      <article id="detailContent" class="detail-card"></article>
    </dialog>

    <dialog id="trailerDialog" class="trailer-dialog">
      <div class="trailer-head">
        <h2 id="trailerTitle"></h2>
        <button type="button" id="trailerClose" aria-label="閉じる">×</button>
      </div>
      <div class="trailer-body">
        <iframe id="trailerFrame" title="予告編" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
      </div>
    </dialog>

    <dialog id="syncDialog">
      <form id="syncForm" method="dialog" class="sync-form">
        <h2>Gist同期の設定</h2>
        <p>PC拡張の「設定（同期・TMDB）」と同じGitHubトークンとGist IDを入力すると、双方向に同期します。</p>
        <label><span>GitHubトークン（gistスコープのclassicトークン）</span><input id="syncToken" type="password" autocomplete="off" placeholder="ghp_…" /></label>
        <label><span>Gist ID</span><input id="syncGistId" autocomplete="off" placeholder="例: 0a1b2c3d…" /></label>
        <div class="detail-actions">
          <button type="button" id="syncCancel">閉じる</button>
          <button type="submit" class="sync-save">保存して同期</button>
        </div>
      </form>
    </dialog>

    <template id="cardTemplate">
      <article class="movie-card">
        <img class="poster" alt="" loading="lazy" referrerpolicy="no-referrer" />
        <div class="movie-copy">
          <div class="movie-meta"></div>
          <h3></h3>
          <div class="ratings"></div>
          <div class="quality" hidden></div>
          <div class="providers" hidden></div>
          <div class="chips"></div>
          <div class="movie-actions">
            <button class="watched-button" type="button">観た</button>
            <button class="favorite-button" type="button" aria-label="お気に入り">☆</button>
            <button class="trailer-button" type="button">▶ 予告編</button>
            <button class="detail-button" type="button">詳細</button>
            <a class="watch-link" target="_blank" rel="noreferrer">開く</a>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
