<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101114" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="U-NEXT List" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>配信マイリスト Safariビューア</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="brand"><span class="brand-mark">ML</span>MY LIST BROWSER</p>
          <h1>次に観る一本</h1>
        </div>
        <div class="topbar-actions">
          <button id="syncButton" class="icon-action" type="button" aria-label="同期">⇅</button>
          <button id="pickButton" class="icon-action" type="button" aria-label="今夜の一本を選ぶ">◎</button>
        </div>
      </header>

      <p id="syncStatus" class="sync-status" role="status" hidden></p>

      <section id="importPanel" class="import-panel">
        <p>右上の「⇅」からGist同期を設定すると、PC拡張の取り込み結果が自動でここに届きます。JSONファイルの読み込みも使えます。</p>
        <div class="import-actions">
          <label class="primary-button" for="importJson">JSONを読み込む</label>
          <input id="importJson" type="file" accept="application/json,.json" hidden />
          <button id="loadSample" class="ghost-button" type="button">サンプル表示</button>
        </div>
      </section>

      <section class="stats" aria-label="ライブラリ集計">
        <div><strong id="totalCount">0</strong><span>作品</span></div>
        <div><strong id="unwatchedCount">0</strong><span>未視聴</span></div>
        <div><strong id="averageRuntime">-</strong><span>平均時間</span></div>
      </section>

      <section class="search-panel" aria-label="作品検索">
        <label class="search-field">
          <span>検索</span>
          <input id="query" type="search" placeholder="作品名、ジャンル、メモ" autocomplete="off" />
        </label>
        <div class="quick-filters" aria-label="よく使う絞り込み">
          <button class="quick-filter is-active" type="button" data-filter="watchState" data-value="unwatched">未視聴</button>
          <button class="quick-filter" type="button" data-filter="mediaType" data-value="movie">映画</button>
          <button class="quick-filter" type="button" data-filter="mediaType" data-value="drama">ドラマ</button>
          <button class="quick-filter" type="button" data-filter="mediaType" data-value="anime">アニメ</button>
          <button class="quick-filter" type="button" data-filter="duration" data-value="around90">90分前後</button>
          <button class="quick-filter" type="button" data-filter="watchState" data-value="favorite">お気に入り</button>
        </div>
      </section>

      <details class="details-filter">
        <summary>詳しく絞り込む <span id="filterSummary">未視聴</span></summary>
        <div class="filter-grid">
          <label>
            <span>大ジャンル</span>
            <select id="mediaType">
              <option value="">すべて</option>
              <option value="movie">映画</option>
              <option value="drama">ドラマシリーズ</option>
              <option value="anime">アニメ</option>
              <option value="unknown">未分類</option>
            </select>
          </label>
          <label>
            <span>サービス</span>
            <select id="service"><option value="">すべて</option></select>
          </label>
          <label>
            <span>ジャンル</span>
            <select id="genre"><option value="">すべて</option></select>
          </label>
          <label>
            <span>上映時間</span>
            <select id="duration">
              <option value="">すべて</option>
              <option value="short">80分未満</option>
              <option value="around90">90分前後（80–100分）</option>
              <option value="around120">120分前後（101–139分）</option>
              <option value="long">140分以上</option>
              <option value="unknown">時間不明</option>
            </select>
          </label>
          <label>
            <span>視聴状態</span>
            <select id="watchState">
              <option value="unwatched">未視聴</option>
              <option value="">すべて</option>
              <option value="watched">視聴済み</option>
              <option value="favorite">お気に入り</option>
            </select>
          </label>
          <label>
            <span>今夜の持ち時間（分）</span>
            <input id="maxMinutes" type="number" min="10" max="600" step="5" placeholder="例: 120" />
          </label>
          <label>
            <span>並び順</span>
            <select id="sort">
              <option value="added">追加順</option>
              <option value="expiry">配信終了が近い順</option>
              <option value="ratingDesc">評価が高い順</option>
              <option value="backlog">積み順（古い順）</option>
              <option value="title">タイトル順</option>
              <option value="runtimeAsc">短い順</option>
              <option value="runtimeDesc">長い順</option>
              <option value="yearDesc">新しい順</option>
            </select>
          </label>
        </div>
      </details>

      <section class="results-head">
        <h2 id="resultsTitle">未視聴の作品</h2>
        <span id="filteredCount">0件</span>
      </section>

      <section id="library" class="library" aria-live="polite"></section>

      <section id="empty" class="empty" hidden>
        <h2>まだ作品がありません</h2>
        <p>PCの拡張機能からJSONを書き出して、この画面で読み込んでください。</p>
      </section>
    </main>

    <nav class="bottom-bar" aria-label="操作">
      <label for="importJson">読み込み</label>
      <button id="exportJson" type="button">書き出し</button>
      <button id="clearFilters" type="button">条件クリア</button>
      <button id="clearAll" type="button">削除</button>
    </nav>

    <dialog id="detailDialog">
      <article id="detailContent" class="detail-card"></article>
    </dialog>

    <dialog id="trailerDialog" class="trailer-dialog">
      <div class="trailer-head">
        <h2 id="trailerTitle"></h2>
        <button type="button" id="trailerClose" aria-label="閉じる">×</button>
      </div>
      <div class="trailer-body">
        <iframe id="trailerFrame" title="予告編" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
      </div>
    </dialog>

    <dialog id="syncDialog">
      <form id="syncForm" method="dialog" class="sync-form">
        <h2>Gist同期の設定</h2>
        <p>PC拡張の「設定（同期・TMDB）」と同じGitHubトークンとGist IDを入力すると、双方向に同期します。</p>
        <label><span>GitHubトークン（gistスコープのclassicトークン）</span><input id="syncToken" type="password" autocomplete="off" placeholder="ghp_…" /></label>
        <label><span>Gist ID</span><input id="syncGistId" autocomplete="off" placeholder="例: 0a1b2c3d…" /></label>
        <div class="detail-actions">
          <button type="button" id="syncCancel">閉じる</button>
          <button type="submit" class="sync-save">保存して同期</button>
        </div>
      </form>
    </dialog>

    <template id="cardTemplate">
      <article class="movie-card">
        <img class="poster" alt="" loading="lazy" referrerpolicy="no-referrer" />
        <div class="movie-copy">
          <div class="movie-meta"></div>
          <h3></h3>
          <div class="ratings"></div>
          <div class="quality" hidden></div>
          <div class="providers" hidden></div>
          <div class="chips"></div>
          <div class="movie-actions">
            <button class="watched-button" type="button">観た</button>
            <button class="favorite-button" type="button" aria-label="お気に入り">☆</button>
            <button class="trailer-button" type="button">▶ 予告編</button>
            <button class="detail-button" type="button">詳細</button>
            <a class="watch-link" target="_blank" rel="noreferrer">開く</a>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
